<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding for the document (UTF-8 supports all international characters) -->
    <meta charset="UTF-8" />
    <!-- Responsive design: makes the page display properly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Page title that appears in the browser tab -->
    <title>Mergington High School Activities</title>
    <!-- Link to external CSS stylesheet for styling -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header section: displays the school name and page title -->
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <!-- Main content area: contains both the activity list and signup form -->
    <main>
      <!-- Section for displaying all available activities -->
      <section id="activities-container">
        <h3>Available Activities</h3>
        <!-- This div will be populated with activity cards by JavaScript -->
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <!-- Section for the signup form where students can register -->
      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <!-- Form for collecting student email and activity choice -->
        <form id="signup-form">
          <!-- Email input field -->
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <!-- Activity selection dropdown -->
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here by JavaScript -->
            </select>
          </div>
          <!-- Submit button -->
          <button type="submit">Sign Up</button>
        </form>
        <!-- Hidden div for displaying success or error messages -->
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <!-- Footer section: displays copyright information -->
    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Link to external JavaScript file that handles dynamic functionality -->
    <script src="app.js"></script>
  </body>
</html>
